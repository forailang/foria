<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>forai Playground</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --yellow: #e3b341;
      --toolbar-h: 44px;
      --tab-h: 36px;
      --status-h: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      height: var(--toolbar-h);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .toolbar .logo {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      margin-right: 12px;
      letter-spacing: -0.3px;
    }

    .toolbar button {
      background: var(--bg-tertiary);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 1.5;
    }

    .toolbar button:hover { background: var(--border); }

    .toolbar button.primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
    }
    .toolbar button.primary:hover { background: #2ea043; }

    .toolbar .spacer { flex: 1; }

    .toolbar .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    .toolbar select {
      background: var(--bg-tertiary);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .toolbar kbd {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      margin-left: 4px;
    }

    /* Main content area */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Panels */
    .panel-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 300px;
      border-right: 1px solid var(--border);
    }

    .panel-output {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }

    /* Tabs */
    .tab-bar {
      height: var(--tab-h);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .tab {
      padding: 0 14px;
      font-size: 12px;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      cursor: pointer;
      white-space: nowrap;
      gap: 6px;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      background: var(--bg);
      border-bottom: 2px solid var(--accent);
    }

    .tab .close {
      font-size: 14px;
      opacity: 0;
      cursor: pointer;
      line-height: 1;
    }
    .tab:hover .close { opacity: 0.6; }
    .tab .close:hover { opacity: 1; }

    .tab-bar .add-tab {
      padding: 0 10px;
      font-size: 16px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .tab-bar .add-tab:hover { color: var(--text); }

    /* Editor area */
    .editor-area {
      flex: 1;
      overflow: hidden;
    }

    .editor-area .cm-editor {
      height: 100%;
    }

    .editor-area .cm-scroller {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Output tabs */
    .output-tabs {
      height: var(--tab-h);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }

    .output-tab {
      padding: 0 14px;
      font-size: 12px;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .output-tab:hover { color: var(--text); }
    .output-tab.active {
      color: var(--text);
      background: var(--bg);
      border-bottom: 2px solid var(--accent);
    }

    .output-content {
      flex: 1;
      overflow: auto;
      padding: 12px;
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .output-content .log-line { margin: 0; }
    .output-content .log-error { color: var(--red); }
    .output-content .log-warn { color: var(--orange); }
    .output-content .log-info { color: var(--text); }
    .output-content .log-debug { color: var(--text-muted); }

    .output-content .compile-error {
      color: var(--red);
      margin: 2px 0;
    }

    .output-content pre {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* IR JSON view */
    .ir-json {
      white-space: pre;
      color: var(--text-muted);
    }

    /* Resize handle */
    .resize-handle {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
    }
    .resize-handle:hover { background: var(--accent); }

    /* Status bar */
    .status-bar {
      height: var(--status-h);
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: var(--text-muted);
      gap: 16px;
      flex-shrink: 0;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading forai compiler...</div>
  </div>

  <div class="toolbar">
    <span class="logo">forai</span>
    <button class="primary" id="btn-run">Run <kbd>Cmd+Enter</kbd></button>
    <button id="btn-format">Format</button>
    <select id="examples-select">
      <option value="">Examples...</option>
    </select>
    <span class="spacer"></span>
    <span class="status" id="status">Initializing...</span>
  </div>

  <div class="main">
    <div class="panel-editor" id="panel-editor">
      <div class="tab-bar" id="editor-tabs"></div>
      <div class="editor-area" id="editor-area"></div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="panel-output">
      <div class="output-tabs">
        <div class="output-tab active" data-panel="output">Output</div>
        <div class="output-tab" data-panel="ir-json">IR JSON</div>
        <div class="output-tab" data-panel="errors">Errors</div>
      </div>
      <div class="output-content" id="output-panel">
        <div class="empty-state">Press Run to execute your code</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="compile-status">Ready</span>
    <span id="file-count"></span>
  </div>

  <script type="module" src="./playground.js"></script>
</body>
</html>
