<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-simple-wasm</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px;
      color: #1a1a1a;
      line-height: 1.5;
      background: #fafafa;
    }
    #app span { display: block; margin-bottom: 4px; }
    #app button {
      border: 1px solid #d0d0d0;
      background: #fff;
      padding: 6px 10px;
      cursor: pointer;
    }
    #app button:hover { background: #f2f2f2; }
    #error { color: #b00020; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { run } from "./forai-browser.js";

    const app = document.getElementById("app");

    if (typeof crossOriginIsolated !== "undefined" && !crossOriginIsolated) {
      app.innerHTML = "<p id=\"error\">Cross-origin isolation required (COOP/COEP headers).</p>";
    } else {
      try {
        await run({
          wasmUrl: "./web-simple-wasm.wasm",
          onPrint: (text) => console.log(text),
          onStdout: (text) => console.log(text),
          onStderr: (text) => console.error(text),
        });
      } catch (e) {
        app.innerHTML = `<p id="error">Error: ${e.message}</p>`;
      }
    }
  </script>
</body>
</html>
